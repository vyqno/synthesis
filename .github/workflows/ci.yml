name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Foundry Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install deps
        run: cd contracts && forge install --no-commit

      - name: Build
        run: cd contracts && forge build --sizes

      - name: Test
        run: cd contracts && forge test -vv

      - name: Fuzz (100 runs in CI)
        run: cd contracts && forge test --fuzz-runs 100 -vv

      - name: Snapshot (gas)
        run: cd contracts && forge snapshot --check 2>/dev/null || forge snapshot

      - name: Noir circuits
        continue-on-error: true
        run: |
          for circuit in circuits/*/; do
            cd "$circuit" && nargo compile && nargo test && cd ../..
          done

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Lint (syntax)
        run: python3 -m py_compile agents/nexus/*.py mcp/*.py

      - name: Unit tests
        run: pytest tests/integration/ -v --tb=short

      - name: E2E tests
        run: pytest tests/e2e/ -v --tb=short -m "not slow"

  web:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: cd web && npm install --legacy-peer-deps

      - name: TypeScript
        run: cd web && npx tsc --noEmit

      - name: Build
        run: cd web && npm run build
